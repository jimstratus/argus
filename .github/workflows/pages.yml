name: Deploy KB site to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build the site
        run: python3 docs/build.py

      - name: Stage publishable files (exclude generator sources)
        run: |
          rm -rf _site && mkdir -p _site
          cp -r docs/. _site/            # includes dotfiles (.nojekyll)
          rm -f _site/*.py               # drop generator sources
          rm -rf _site/__pycache__       # drop bytecode cache
          echo "Published tree:"; find _site -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
